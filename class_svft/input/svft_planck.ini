# ================================================================
# 1. THAM SỐ VŨ TRỤ HỌC CƠ BẢN (ΛCDM Baseline from Planck 2018)
# ================================================================

# Tham số Hubble (H0 = 100*h km/s/Mpc)
H0 = 67.36

# Mật độ baryon (omega_b = Omega_b * h^2)
omega_b = 0.02237

# Mật độ vật chất tối (omega_cdm = Omega_cdm * h^2)
omega_cdm = 0.1200

# Tổng khối lượng neutrino (eV)
# m_ncdm = 0.06

# Điều kiện tái ion hóa
tau_reio = 0.0544

# Biên độ phổ vô hướng: ln(10^10 * A_s)
ln10^{10}A_s = 3.044

# Chỉ số phổ nguyên sơ (scalar spectral index)
n_s = 0.9649

# ================================================================
# 2. KÍCH HOẠT HI_CLASS & SVFT EFT MAPPING
# ================================================================

# Mô hình trọng lực: Bellini-Sawicki (EFT framework)
# Cho phép mô tả sự lệch nhân quả (metric perturbation difference)
gravity_model = bellini_sawicki

# Mô hình sự giãn nở trong EFT: ΛCDM baseline
expansion_model = lcdm

# Các hàm alpha được tham số hóa dựa trên Omega_smg
# Ánh xạ SVFT → EFT functions (Bellini-Sawicki)
# Thứ tự: [alpha_M, alpha_B, alpha_K, alpha_T]
#
# alpha_M (Running of Planck mass): Được điều khiển bởi eps_vft
# alpha_B (Braiding): Được điều khiển bởi lambda_vft
# alpha_K (Kineticity): Phụ thuộc vào sự khác biệt động học
# alpha_T (Tensor speed excess): = 0 để thỏa GW170817 (c_t = c)
#
parameters_smg = 0.01, 0.05, 0.1, 0.0

# ================================================================
# 3. THAM SỐ SVFT CỤ THỂ (QTC Physics Core)
# ================================================================

# a0_vft: Ngưỡng gia tốc sàng lọc
# Ý nghĩa: Độ lớn gia tốc mà tại đó cơ chế sàng lọc kích hoạt
# Đơn vị: m/s²
# Giá trị: 1.2e-10 ~ MOND acceleration constant × 10^-2
# Vật lý: Kiểm soát ranh giới giữa chế độ screened/unscreened
a0_vft = 1.2e-10

# lambda_vft: Hệ số liên kết trường vector với vật chất
# Ý nghĩa: Cường độ tương tác scalar-matter coupling
# Đơn vị: Dimensionless
# Giá trị: 0.05 ~ 5% độ mạnh của tương tác
# Vật lý: Điều khiển mức độ sửa đổi trọng lực (deviation from GR)
lambda_vft = 0.05

# eps_vft: Tốc độ chạy của khối lượng Planck hiệu dụng
# Ý nghĩa: d(M_Pl^2)/d(ln a) → hệ số running
# Đơn vị: Dimensionless
# Giá trị: 0.01 ~ 1% thay đổi trong Planck mass evolution
# Vật lý: Mô tả cách khối lượng Planck thay đổi với scale factor
eps_vft = 0.01

# n_vft: Số mũ của hàm sàng lọc (Screening exponent)
# Ý nghĩa: Power-law index trong S(a) = 1/(1 + (rho/rho_c)^n)
# Đơn vị: Dimensionless
# Giá trị: 2.0 ~ Standard chameleon/symmetron screening
# Vật lý: Kiểm soát độ "mạnh" của chuyển tiếp screening
n_vft = 2.0

# rho_c_vft: Mật độ tới hạn kích hoạt cơ chế sàng lọc
# Ý nghĩa: Ngưỡng mật độ vật chất để screening hoạt động
# Đơn vị: kg/m³
# Giá trị: 1.0e-10 kg/m³ ~ vũ trụ homogeneous density scale
# Vật lý: Tại ρ >> ρ_c: Screening hoàn toàn (GR-like)
#         Tại ρ << ρ_c: Unscreened (modified gravity strong)
rho_c_vft = 1.0e-10

# ================================================================
# 4. THIẾT LẬP ĐẦU RA & GIẢI QUYẾT PHƯƠNG TRÌNH (OUTPUT CONTROL)
# ================================================================

# Các phổ được tính:
# tCl   = Temperature (TT) CMB power spectrum
# pCl   = Polarization (EE+TE+BB) CMB power spectrum
# lCl   = Lensing potential power spectrum
# mPk   = Matter power spectrum P(k,z)
output = tCl, pCl, lCl, mPk

# Kích hoạt lensing: Cơ chế lensing của trường phân kỳ tiềm năng
lensing = yes

# Chế độ phi tuyến: HALOFIT để mô tả cây cấu trúc phi tuyến
non linear = halofit

# ================================================================
# 5. ĐỘ PHÂN GIẢI TÍNH TOÁN (Numerical precision)
# ================================================================

# Độ phân giải đa cực (Multipole moments)
# l_max_scalars = 2500 → Tính đến l ~ 2500 (phù hợp với Planck resolution)
l_max_scalars = 2500

# Độ phân giải spectrum vật chất (Matter spectrum resolution)
# P_k_max_h/Mpc = 1.0 → Tính đến k ~ 1.0 h/Mpc
# (Thích hợp cho CMB lensing + BAO)
P_k_max_h/Mpc = 1.0

# Độ phân giải tại các redshift (Redshift sampling)
# z_max_pk = 3.0 → Tính P(k) từ z=0 đến z=3
z_max_pk = 3.0

# ================================================================
# 6. QUẢN LÝ TỆP TIN & VERBOSE (File Management)
# ================================================================

# Tiền tố đầu ra (Output root path)
# Các tệp sẽ được lưu như: output/svft_planck_v1_*.dat
root = output/svft_planck_v1_

# Ghi tệp background evolution (để kiểm chứng)
write background = yes

# Ghi tệp thermodynamics evolution
write thermodynamics = yes

# Ghi tệp đầu vào (parameters log)
write parameters = yes

# Mức độ chi tiết log (0=silent, 1=basic, 2=detailed)
verbose = 1

# ================================================================
# 7. THÔNG SỐ VỀ HIỆU CHỈNH CHẨ N (Fine-tuning notes)
# ================================================================

# alpha_T = 0.0:
#   Rất quan trọng! Đảm bảo tốc độ sóng hấp dẫn c_t = c
#   Giúp thuyết sống sót qua GW170817 constraints
#   (Kiểm chứng: |c_t/c - 1| < 10^-15)

# gravity_model = bellini_sawicki:
#   "Cầu" nối SVFT theory với EFT framework trong hi_class
#   Tự động tính các đạo hàm vi phân cho metric perturbations Φ, Ψ

# non linear = halofit:
#   Kích hoạt khi muốn kiểm chứng tại quy mô thiên hà (NGC 3198, v.v.)
#   Mô phỏng sự hình thành cấu trúc phi tuyến (bumpiness của vật chất tối)

